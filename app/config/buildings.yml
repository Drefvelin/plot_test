# Building definitions: zone type, display colour, and building mix per plot.

buildings:

  house:

    type: residential

    fill_in: true

    rgb: [220, 180, 140]

    buildings:

      small: 1

  church:

    type: urban

    fill_in: false

    allow_plot_fill: false

    rgb: [160, 160, 210]

    buildings:

      huge: 1

      tiny: 0-2

  farm:

    type: rural

    rgb: [140, 190, 120]

    movable: true

    terrain:

      prefer: plains

      placement: inside

      requirement: loose

    buildings:

      large: 1

      medium: 1

      small: 1-2

  lumber_camp:

    type: rural

    rgb: [100, 150, 80]

    movable: true

    terrain:

      prefer: forest

      placement: proximity

      requirement: loose

      proximity_max_dist: 20

    buildings:

      small: 1

      tiny: 2-3

  mine:

    type: rural

    rgb: [150, 140, 130]

    movable: true

    terrain:

      prefer: hills

      placement: proximity

      requirement: loose

      proximity_max_dist: 12

    buildings:

      small: 1

      tiny: 2-3

  fisher_hut:

    type: any

    rgb: [120, 160, 200]

    movable: true

    terrain:

      prefer: [sea, river]

      placement: border

      requirement: loose

      border_style: hug

      border_overhang_dist: 2

      border_min_dist: 2

      border_max_dist: 12

    buildings:

      small: 1

  watermill:

    type: any

    rgb: [170, 170, 190]

    movable: true

    terrain:

      prefer: river

      placement: border

      requirement: strict

      border_style: hug

      border_overhang_dist: 4

      border_min_dist: 2

      border_max_dist: 15

    buildings:

      medium: 1

      tiny: 0-1

  workshop:

    type: urban

    rgb: [180, 140, 100]

    buildings:

      small: 1

      tiny: 1-2



building_templates:

  tiny:

    size:

      min_area: 40

      max_area: 60

    conditions:

      - long_facing_middle

      - door_long

      - edge_placement

      - corner_placement

      - diagonal_allowed

  small:

    size:

      min_area: 60

      max_area: 120

    conditions:

      - edge_placement

      - corner_placement

  medium:

    size:

      min_area: 120

      max_area: 200

    conditions:

      - edge_placement

  large:

    size:

      min_area: 200

      max_area: 350

    conditions:

      - edge_placement

  huge:

    size:

      min_area: 350

      max_area: 600

    conditions:

      - door_short

      - middle_placement



plot_sizes:

  tiny:

    min_area: 150

    max_area: 250

  small:

    min_area: 250

    max_area: 400

  medium:

    min_area: 400

    max_area: 600

  large:

    min_area: 600

    max_area: 900

  huge:

    min_area: 900

    max_area: 1500

